<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OTP Verification</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f7;
      font-family: Arial, sans-serif;
      color: #333333;
    }
    .email-container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    .header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #eaeaea;
    }
    .header h1 {
      margin: 0;
      color: rgb(6, 160, 139);
      font-size: 28px;
    }
    .content {
      padding: 25px 0;
      font-size: 16px;
      line-height: 1.5;
    }
    .otp-code {
      display: block;
      margin: 20px auto;
      background-color:rgb(6, 160, 139);
      color: #ffffff;
      font-weight: bold;
      font-size: 24px;
      letter-spacing: 4px;
      width: fit-content;
      padding: 10px 25px;
      border-radius: 6px;
      text-align: center;
      user-select: all;
    }
    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: #999999;
      text-align: center;
    }
    @media screen and (max-width: 620px) {
      .email-container {
        margin: 20px 10px;
        padding: 20px;
      }
      .header h1 {
        font-size: 24px;
      }
      .otp-code {
        font-size: 20px;
        padding: 8px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="email-container" role="main">
    <div class="header">
      <h1>OTP Verification</h1>
    </div>
    <div class="content">
      <p>Hi {{ user.first_name }},</p>
      <p>Your OTP code is:</p>
      <span class="otp-code">{{ otp }}</span>
      <p>Please enter this code to complete your verification in 10 minutes. If you did not request this code, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>Thank you for trusting us.</p>
    </div>
  </div>
</body>
</html>
